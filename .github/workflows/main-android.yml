name: Android Pre-Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'NipoVPN/**'
      - '.github/workflows/main-android.yml'

permissions:
  contents: write

env:
  PACKAGE_VERSION: 1.1.59.3

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: NipoVPN

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Restore release keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Create keystore.properties
        run: |
          cat > keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}
          keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}
          EOF

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build signed APK and AAB
        run: ./gradlew clean assembleRelease bundleRelease

      - name: Verify AAB signature
        run: jarsigner -verify -verbose -certs app/build/outputs/bundle/release/app-release.aab

      - name: Verify APK signature
        run: jarsigner -verify -verbose -certs app/build/outputs/apk/release/app-release.apk

      - name: Prepare release files
        run: |
          mkdir -p ../release

          cp app/build/outputs/bundle/release/app-release.aab \
             ../release/NipoVPN-${{ env.PACKAGE_VERSION }}.aab

          cp app/build/outputs/apk/release/app-release.apk \
             ../release/NipoVPN-${{ env.PACKAGE_VERSION }}.apk

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-${{ env.PACKAGE_VERSION }}
          name: Android build ${{ env.PACKAGE_VERSION }}
          prerelease: true
          generate_release_notes: true
          files: |
            release/*.aab
            release/*.apk