name: Android Pre-Release

on:
  push:
    branches:
      - dev
      - mori
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NipoVPN

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Prepare APK
        run: |
          mkdir -p ../release
          cp app/build/outputs/apk/debug/app-debug.apk \
             ../release/NipoVPN-${{ github.ref_name }}-${{ github.run_number }}.apk

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-${{ github.ref_name }}-${{ github.run_number }}
          name: Android ${{ github.ref_name }} build ${{ github.run_number }}
          prerelease: true
          generate_release_notes: true
          files: release/*.apk